<!doctype html>
<html lang="en" data-theme="halloween">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Champion - Quality, Recycled Athletic Wear</title>

    <!-- DaisyUI component styles + light/dark themes -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/daisyui.css" rel="stylesheet" type="text/css" />

    <!-- DaisyUI additional themes -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <header>
        <button class="btn btn-info">Champion</button>
        <button class="btn btn-error">Men's</button>
        <button class="btn btn-error">Women's</button>
        <button class="btn btn-error">Kids</button>
        <button class="btn btn-error">Shoes</button>
        <button class="btn btn-error">About Us</button>
      </header>
      <div class="card bg-base-100 image-full w-188 shadow-sm">
        <figure>
          <img src="images/arthur-edelmans-A9UonVi-cwk-unsplash.jpg" />
        </figure>
        <div class="card-body">
          <h1>Quality clothes threaded for Athletic Performance</h1>
          <button class="btn btn-primary">Shop Now</button>
        </div>
      </div>
      <div class="card lg:card-side bg-base-100 shadow-sm">
        <figure>
          <img src="images/alexandra-tran-GwB-oLPdrWU-unsplash.jpg" style="max-width: 60%"/>
        </figure>
        <div class="card-body">
          <h2 class="card-title">Why we use recycled materials</h2>
          <p>We use 100% recycled fabrics in our clothing to prevent pollution and care for the environment.</p>
          <div class="card-actions justify-end">
            <button class="btn btn-error">Learn More</button>
          </div>
        </div>
        <div class="card card-side bg-base-100 shadow-sm">
        <figure>
          <img src="images/whereslugo-IQBp2Dy9TJQ-unsplash.jpg" style="max-width: 60%"/>
        </figure>
        <div class="card-body">
          <h2 class="card-title">Tested and approved quality</h2>
          <p>Our fabrics are certified by the Global Fabrics Committee for Athletic Competition.</p>
          <div class="card-actions justify-end">
            <button class="btn btn-error">Learn More</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
